model_profiles:
  balanced:
    provider_chain:
      - provider: openai
        model: gpt-4o-mini
        api_key_env: OPENAI_API_KEY
      - provider: anthropic
        model: claude-sonnet-4-20250514
        api_key_env: ANTHROPIC_API_KEY
      - provider: fake
        model: deterministic
    temperature: 0.1
    max_tokens: 1800
  quality:
    provider_chain:
      - provider: anthropic
        model: claude-opus-4-20250514
        api_key_env: ANTHROPIC_API_KEY
      - provider: openai
        model: gpt-4o
        api_key_env: OPENAI_API_KEY
      - provider: fake
        model: deterministic
    temperature: 0.1
    max_tokens: 2400
  budget:
    provider_chain:
      - provider: openai
        model: gpt-4o-mini
        api_key_env: OPENAI_API_KEY
      - provider: fake
        model: deterministic
    temperature: 0.0
    max_tokens: 1200
