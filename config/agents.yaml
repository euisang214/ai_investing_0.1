agents:
- id: gatekeeper_advocate
  name: Gatekeeper Advocate
  panel_id: gatekeepers
  parent_id: null
  role_type: specialist
  goal: Build the base-case gatekeeper claim set from evidence.
  enabled: true
  prompt_path: prompts/gatekeepers/advocate.md
  input_channels:
  - evidence
  - prior_claims
  - prior_memo
  output_schema: ClaimCard
  memory_read_namespaces:
  - company/{company_id}/evidence
  - company/{company_id}/claims/{factor_id}
  - company/{company_id}/memos/current
  memory_write_namespaces:
  - company/{company_id}/claims/{factor_id}
  allowed_tool_bundle: gatekeeper_research
  model_profile: balanced
  scope: both
  tags:
  - vertical_slice
  - gatekeepers
  - advocate
- id: gatekeeper_skeptic
  name: Gatekeeper Skeptic
  panel_id: gatekeepers
  parent_id: gatekeeper_advocate
  role_type: skeptic
  goal: Pressure-test gatekeeper claims and surface disconfirming evidence.
  enabled: true
  prompt_path: prompts/gatekeepers/skeptic.md
  input_channels:
  - evidence
  - prior_claims
  output_schema: ClaimCard
  memory_read_namespaces:
  - company/{company_id}/evidence
  - company/{company_id}/claims/{factor_id}
  memory_write_namespaces:
  - company/{company_id}/claims/{factor_id}
  allowed_tool_bundle: gatekeeper_research
  model_profile: balanced
  scope: both
  tags:
  - vertical_slice
  - gatekeepers
  - skeptic
- id: gatekeeper_durability
  name: Gatekeeper Durability
  panel_id: gatekeepers
  parent_id: gatekeeper_advocate
  role_type: durability
  goal: Evaluate whether the gatekeeper thesis persists through stress and time.
  enabled: true
  prompt_path: prompts/gatekeepers/durability.md
  input_channels:
  - evidence
  - prior_claims
  output_schema: ClaimCard
  memory_read_namespaces:
  - company/{company_id}/evidence
  - company/{company_id}/claims/{factor_id}
  memory_write_namespaces:
  - company/{company_id}/claims/{factor_id}
  allowed_tool_bundle: gatekeeper_research
  model_profile: balanced
  scope: both
  tags:
  - vertical_slice
  - gatekeepers
  - durability
- id: gatekeeper_judge
  name: Gatekeeper Judge
  panel_id: gatekeepers
  parent_id: gatekeeper_advocate
  role_type: judge
  goal: Consolidate gatekeeper claims into a single panel verdict.
  enabled: true
  prompt_path: prompts/gatekeepers/judge.md
  input_channels:
  - claims
  - evidence
  output_schema: GatekeeperVerdict
  memory_read_namespaces:
  - company/{company_id}/claims/{factor_id}
  - company/{company_id}/evidence
  memory_write_namespaces:
  - company/{company_id}/verdicts/{panel_id}
  allowed_tool_bundle: gatekeeper_research
  model_profile: quality
  scope: both
  tags:
  - vertical_slice
  - gatekeepers
  - judge
- id: gatekeeper_panel_lead
  name: Gatekeeper Panel Lead
  panel_id: gatekeepers
  parent_id: gatekeeper_judge
  role_type: lead
  goal: Decide whether the company clears gatekeeping for deeper memo work.
  enabled: true
  prompt_path: prompts/gatekeepers/panel_lead.md
  input_channels:
  - panel_verdict
  output_schema: GatekeeperVerdict
  memory_read_namespaces:
  - company/{company_id}/verdicts/{panel_id}
  memory_write_namespaces:
  - company/{company_id}/verdicts/{panel_id}
  allowed_tool_bundle: ic_judge
  model_profile: quality
  scope: both
  tags:
  - vertical_slice
  - gatekeepers
  - lead
