services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ai_investing
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "15432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d ai_investing" ]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Default dev service — runs without any --profile flag
  api:
    build:
      context: .
      target: dev
    env_file:
      - .env.example
    environment:
      AI_INVESTING_DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/ai_investing
      AI_INVESTING_CONFIG_DIR: /app/config
      AI_INVESTING_PROMPTS_DIR: /app/prompts
      AI_INVESTING_PROVIDER: fake
      AI_INVESTING_ALLOW_FAKE_FALLBACK: "true"
      AI_INVESTING_AUTH_ENABLED: "false"
      AI_INVESTING_LOG_LEVEL: DEBUG
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./.planning:/app/.planning
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
      - ./config:/app/config
      - ./docs:/app/docs
      - ./n8n:/app/n8n
      - ./prompts:/app/prompts
      - ./examples:/app/examples
      - ./scripts:/app/scripts
      - ./src:/app/src
      - ./tests:/app/tests

  # Production service — requires --profile prod
  api-prod:
    profiles: [ prod ]
    build:
      context: .
      target: prod
    environment:
      AI_INVESTING_CONFIG_DIR: /app/config
      AI_INVESTING_PROMPTS_DIR: /app/prompts
      AI_INVESTING_PROVIDER: auto
      AI_INVESTING_ALLOW_FAKE_FALLBACK: "false"
      AI_INVESTING_AUTH_ENABLED: "true"
      AI_INVESTING_LOG_LEVEL: INFO
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
